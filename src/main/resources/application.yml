server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: zokomart-admin
  profiles:
    # local 为本地未提交 profile（application-local.yml，已 gitignore），用于注入密钥，覆盖 dev 中的占位
    active: dev,local
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: false
  token-style: uuid
