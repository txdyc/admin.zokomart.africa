server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: zokomart-admin
  profiles:
    # local 为本地未提交 profile（application-local.yml，已 gitignore），用于注入密钥，覆盖 dev 中的占位
    active: dev,local
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml

sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: false
  token-style: uuid

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    url-prefix: /files
    max-size: 2097152
    allowed-types: png,jpg,jpeg,webp,gif
  scrape:
    allowed-hosts:
      - morgan.dzncm.com
  wc:
    base-url: ${WC_BASE_URL:}
    consumer-key: ${WC_CONSUMER_KEY:}
    consumer-secret: ${WC_CONSUMER_SECRET:}
    regular-multiplier: 1.75
    sale-multiplier: 1.5
